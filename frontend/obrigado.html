<script src="./assets/js/appConfig.js"></script>
<script>
  function getWhatsAppLink(message = "Olá, quero fazer uma simulação de empréstimo.") {
    return `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(message)}`;
  }

  const btn = document.getElementById("thankYouWhatsAppBtn");
  const msg = document.getElementById("thankYouMessage");
  const url = sessionStorage.getItem("emprestimo_whatsapp_url");
  const nome = sessionStorage.getItem("emprestimo_lead_nome");

  if (nome) {
    msg.textContent = "Obrigado, " + nome + ". Seus dados foram enviados com sucesso.";
  }

  const finalUrl = url || getWhatsAppLink("Olá, quero fazer uma simulação de empréstimo.");

  btn.href = finalUrl;

  setTimeout(function () {
    window.open(finalUrl, "_blank");
  }, 700);
</script>
